<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Panel Vendedor · RutaSmart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/vendedor.css">
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-content">
      <div class="logo-section">
        <div class="logo-icon"><i class="fas fa-map-location-dot"></i></div>
        <div>
          <h1>RutaSmart</h1>
          <p>Panel del Vendedor</p>
        </div>
      </div>
      <div class="user-section">
        <div class="user-info">
          <span class="user-name" id="userName">Vendedor</span>
          <button class="logout-btn" id="logoutBtn" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="route-info">
      <h2 id="routeTitle">Mi Ruta</h2>
      <p id="routeSubtitle">Puntos de visita del día</p>
    </div>

    <div class="ruta-container">
      <div class="ruta-timeline">
        <!-- PUNTO DE PARTIDA -->
        <div class="timeline-item starting-point">
          <div class="timeline-marker">
            <i class="fas fa-location-dot"></i>
            <span class="marker-label">INICIO</span>
          </div>
          <div class="point-content">
            <div class="point-header">
              <h3>Punto de Partida</h3>
              <p id="sedeInfo">Sede Principal</p>
            </div>
            <button class="btn-add-client" id="btnAddClient">
              <i class="fas fa-plus-circle"></i>
              Nuevo Cliente
            </button>
          </div>
        </div>

        <!-- CONECTORES Y PUNTOS DE VISITA -->
        <div class="timeline-items" id="pointsList">
          <!-- Lista de puntos generada dinámicamente -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal para crear nuevo cliente -->
<div class="modal" id="modalNuevoCliente">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Nuevo Cliente</h2>
      <button class="close-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <form id="formNuevoCliente">
      <div class="form-group">
        <label for="clientNombre">Nombre del Cliente</label>
        <input type="text" id="clientNombre" required>
      </div>
      <div class="form-group">
        <label for="clientCalle">Calle/Carrera</label>
        <input type="text" id="clientCalle" required>
      </div>
      <div class="form-group">
        <label for="clientNumero">Número</label>
        <input type="text" id="clientNumero" required>
      </div>
      <div class="form-group">
        <label for="clientBarrio">Barrio</label>
        <input type="text" id="clientBarrio" required>
      </div>
      <div class="form-group">
        <label for="clientTelefono">Teléfono</label>
        <input type="tel" id="clientTelefono" required>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" id="btnCancelForm">Cancelar</button>
        <button type="submit" class="btn-submit">Guardar Cliente</button>
      </div>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/vendedor.js"></script>
</body>
</html>
