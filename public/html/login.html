<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - RutaSmart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      background: #2563eb;
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 22px;
    }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0f172a;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #334155;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .extra-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .extra-links a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-map-location-dot"></i></div>
      <div class="logo-text">RutaSmart</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>
    <div class="extra-links">
      <span>¿No tienes cuenta? <a href="#" id="registroLink">Solicitar acceso</a></span>
    </div>
  </div>

  <!-- Reutilizamos el APIClient de api.js -->
  <script src="/js/api.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    // Si ya hay sesión, ir directo al panel
    if (api.getToken()) {
      window.location.href = '/html/index.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorMsg.style.display = 'none';
      try {
        const res = await api.login(email, password);
        localStorage.setItem('userName', res.data?.Nombre || 'Usuario');
        window.location.href = '/html/index.html';
      } catch (err) {
        errorMsg.textContent = err.message || 'Error al iniciar sesión. Verifica tus credenciales.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
