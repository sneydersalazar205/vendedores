<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RutaSmart · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 40px;
      color: white;
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
    }

    h1 {
      font-size: 2.5rem;
      color: #0f172a;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.1rem;
      color: #64748b;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
      justify-content: center;
    }

    .btn-admin {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
    }

    .btn-admin:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
    }

    .btn-vendor {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }

    .btn-vendor:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
    }

    .features {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 2px solid #e2e8f0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 30px;
    }

    .feature {
      text-align: center;
    }

    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .feature h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .feature p {
      font-size: 0.85rem;
      color: #9ca3af;
      margin: 0;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        min-width: 100%;
      }

      .features {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo"><i class="fas fa-map-location-dot"></i></div>
  <h1>RutaSmart</h1>
  <p>Gestión de Rutas y Ventas</p>

  <div class="buttons">
    <a href="/html/admin.html" class="btn btn-admin">
      <i class="fas fa-chart-pie"></i>
      Panel Admin
    </a>
    <a href="/html/vendedor.html" class="btn btn-vendor">
      <i class="fas fa-user"></i>
      Panel Vendedor
    </a>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon"><i class="fas fa-globe"></i></div>
      <h3>Regiones</h3>
      <p>Gestión geográfica</p>
    </div>
    <div class="feature">
      <div class="feature-icon"><i class="fas fa-route"></i></div>
      <h3>Rutas</h3>
      <p>Planificación de rutas</p>
    </div>
    <div class="feature">
      <div class="feature-icon"><i class="fas fa-users"></i></div>
      <h3>Usuarios</h3>
      <p>Gestión de equipo</p>
    </div>
    <div class="feature">
      <div class="feature-icon"><i class="fas fa-chart-bar"></i></div>
      <h3>Reportes</h3>
      <p>Análisis y datos</p>
    </div>
  </div>
</div>

</body>
</html>
