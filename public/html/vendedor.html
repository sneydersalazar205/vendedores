<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Panel Vendedor · RutaSmart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/vendedor.css">
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-content">
      <div class="logo-section">
        <div class="logo-icon"><i class="fas fa-map-location-dot"></i></div>
        <div>
          <h1>RutaSmart</h1>
          <p>Panel del Vendedor</p>
        </div>
      </div>
      <div class="user-section">
        <div class="user-info">
          <span class="user-name" id="userName">Vendedor</span>
          <button class="logout-btn" id="goToOtherHtmlBtn" title="Ir a otra vista"><i class="fas fa-up-right-from-square"></i></button>
          <button class="logout-btn" id="logoutBtn" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <!-- SELECTOR DE RUTAS -->
    <div id="rutaSelector" style="display:none;">
      <div class="route-info">
        <h2>Mis Rutas</h2>
        <p>Selecciona la ruta activa para hoy</p>
      </div>
      <div id="rutaCards" class="ruta-cards-grid"></div>
    </div>

    <!-- DETALLE DE RUTA ACTIVA -->
    <div id="rutaDetalle" style="display:none;">
      <div class="route-info">
        <button id="btnVolverRutas" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:13px;margin-bottom:8px;">
          <i class="fas fa-arrow-left"></i> Mis rutas
        </button>
        <h2 id="routeTitle">Mi Ruta</h2>
        <p id="routeSubtitle">Puntos de visita del día</p>
      </div>

      <div class="ruta-container">
        <div class="ruta-timeline">
          <div class="timeline-item starting-point">
            <div class="timeline-marker">
              <i class="fas fa-location-dot"></i>
              <span class="marker-label">INICIO</span>
            </div>
            <div class="point-content">
              <div class="point-header">
                <h3>Punto de Partida</h3>
                <p id="sedeInfo">Sede Principal</p>
              </div>
            </div>
          </div>

          <div class="timeline-items" id="pointsList"></div>
        </div>
      </div>
    </div>

    <!-- LOADING / EMPTY STATE -->
    <div id="loadingState">
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Cargando...</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== MODAL: REGISTRAR VISITA ===== -->
<div class="modal" id="modalVisita">
  <div class="modal-content">
    <div class="modal-header">
      <h2><i class="fas fa-clipboard-check"></i> Registrar Visita</h2>
      <button class="close-btn" id="closeModalVisita"><i class="fas fa-times"></i></button>
    </div>
    <div id="geoStatus" class="geo-status geo-checking">
      <i class="fas fa-spinner fa-spin"></i> Obteniendo ubicación...
    </div>
    <div id="modalVisitaInfo" class="modal-cliente-info"></div>
    <form id="formVisita">
      <div class="form-group">
        <label>Estado de la visita</label>
        <select id="visitaEstado" required>
          <option value="">Seleccionar estado...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="visitaObservacion">Observación</label>
        <textarea id="visitaObservacion" rows="3" placeholder="Comentarios opcionales..."></textarea>
      </div>

      <!-- Sección venta (se muestra si estado = Venta Realizada) -->
      <div id="ventaSection" style="display:none;">
        <hr style="margin:16px 0;">
        <h4><i class="fas fa-shopping-cart"></i> Productos del pedido</h4>
        <div id="productosList" class="productos-list"></div>
        <div class="total-venta" id="totalVenta" style="display:none;">
          <strong>Total: </strong><span id="totalVentaValor">$0</span>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" id="cancelVisita">Cancelar</button>
        <button type="submit" class="btn-submit" id="submitVisita">
          <i class="fas fa-check"></i> Guardar visita
        </button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/vendedor.js"></script>
</body>
</html>
